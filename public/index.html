<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>위시풀스테이 고객 안내</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f5f4f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    /* 챗 화면 */
    #chat-screen {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      height: -webkit-fill-available;
      background: #fff;
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
    }

    /* 헤더 */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }
    .chat-header .avatar {
      width: 36px; height: 36px;
      background: #4a7c6b;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header .info h2 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .chat-header .info p  { font-size: 12px; color: #4a7c6b; }

    /* 메시지 영역 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .msg .bubble {
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: #4a7c6b; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #f0f0ee; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .msg .bot-icon {
      width: 30px; height: 30px;
      background: #4a7c6b;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    /* 타이핑 인디케이터 */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #aaa;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 입력 영역 */
    .chat-input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .chat-input-area textarea:focus { border-color: #4a7c6b; }
    .chat-input-area button {
      width: 48px; height: 48px;
      background: #4a7c6b;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background 0.2s;
      -webkit-appearance: none;
    }
    .chat-input-area button:hover   { background: #3d6b5c; }
    .chat-input-area button:active  { background: #3d6b5c; }
    .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }

    @media (max-width: 480px) {
      .msg { max-width: 92%; }
      .msg .bubble { font-size: 15px; }
      .chat-header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <div id="chat-screen">
    <div class="chat-header">
      <div class="avatar">🏨</div>
      <div class="info">
        <h2>위시풀스테이 고객 안내</h2>
        <p>● 운영 중 (09:00 ~ 21:00)</p>
      </div>
    </div>

    <div id="messages">
      <div class="msg bot">
        <div class="bot-icon">🏨</div>
        <div class="bubble">안녕하세요! 위시풀스테이입니다 😊<br>예약, 이용 안내, 취소·환불 등 궁금하신 점을 편하게 질문해주세요.</div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="user-input"
        placeholder="질문을 입력하세요..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    let chatHistory = [];

    async function sendMessage() {
      const textarea = document.getElementById('user-input');
      const text = textarea.value.trim();
      if (!text) return;

      textarea.value = '';
      textarea.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      addMessage('user', text);
      const typingEl = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory }),
        });

        typingEl.remove();

        if (!res.ok) {
          const err = await res.json();
          addMessage('bot', '⚠️ ' + (err.error || '오류가 발생했습니다.'));
        } else {
          const data = await res.json();
          addMessage('bot', data.reply);
          chatHistory.push({ role: 'user',      content: text });
          chatHistory.push({ role: 'assistant', content: data.reply });
          if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
        }
      } catch (e) {
        typingEl.remove();
        addMessage('bot', '⚠️ 서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
      }

      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }

    function addMessage(role, text) {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'bot') {
        div.innerHTML = '<div class="bot-icon">🏨</div><div class="bubble">' + escapeHtml(text) + '</div>';
      } else {
        div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addTyping() {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.innerHTML = '<div class="bot-icon">🏨</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/\n/g, '<br>');
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
