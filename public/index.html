<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>矛聹聞矛聥聹铆聮聙矛聤陇铆聟聦矛聺麓 锚鲁聽锚掳聺 矛聲聢毛聜麓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f5f4f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    /* 芒聰聙芒聰聙 矛卤聴 铆聶聰毛漏麓 芒聰聙芒聰聙 */
    #chat-screen {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      height: -webkit-fill-available;
      background: #fff;
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
    }

    /* 铆聴陇毛聧聰 */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }
    .chat-header .avatar {
      width: 36px; height: 36px;
      background: #4a7c6b;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header .info h2 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .chat-header .info p  { font-size: 12px; color: #4a7c6b; }

    /* 毛漏聰矛聥聹矛搂聙 矛聵聛矛聴颅 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .msg .bubble {
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: #4a7c6b; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #f0f0ee; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .msg .bot-icon {
      width: 30px; height: 30px;
      background: #4a7c6b;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    /* 铆聝聙矛聺麓铆聲聭 矛聺赂毛聰聰矛录聙矛聺麓铆聞掳 */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #aaa;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 矛聻聟毛聽楼 矛聵聛矛聴颅 */
    .chat-input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .chat-input-area textarea:focus { border-color: #4a7c6b; }
    .chat-input-area button {
      width: 48px; height: 48px;
      background: #4a7c6b;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background 0.2s;
      -webkit-appearance: none;
    }
    .chat-input-area button:hover   { background: #3d6b5c; }
    .chat-input-area button:active  { background: #3d6b5c; }
    .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }

    @media (max-width: 480px) {
      .msg { max-width: 92%; }
      .msg .bubble { font-size: 15px; }
      .chat-header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- 芒聰聙芒聰聙 矛卤聴 铆聶聰毛漏麓 芒聰聙芒聰聙 -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="avatar">冒聼聫篓</div>
      <div class="info">
        <h2>矛聹聞矛聥聹铆聮聙矛聤陇铆聟聦矛聺麓 锚鲁聽锚掳聺 矛聲聢毛聜麓</h2>
        <p>芒聴聫 矛職麓矛聵聛 矛陇聭 (09:00 ~ 21:00)</p>
      </div>
    </div>

    <div id="messages">
      <div class="msg bot">
        <div class="bot-icon">冒聼聫篓</div>
        <div class="bubble">矛聲聢毛聟聲铆聲聵矛聞赂矛職聰! 矛聹聞矛聥聹铆聮聙矛聤陇铆聟聦矛聺麓矛聻聟毛聥聢毛聥陇 冒聼聵聤<br>矛聵聢矛聲陆, 矛聺麓矛職漏 矛聲聢毛聜麓, 矛路篓矛聠聦脗路铆聶聵毛露聢 毛聯卤 锚露聛锚赂聢铆聲聵矛聥聽 矛聽聬矛聺聞 铆聨赂铆聲聵锚虏聦 矛搂聢毛卢赂铆聲麓矛拢录矛聞赂矛職聰.</div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="user-input"
        placeholder="矛搂聢毛卢赂矛聺聞 矛聻聟毛聽楼铆聲聵矛聞赂矛職聰..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">芒聻陇</button>
    </div>
  </div>

  <script>
    let chatHistory = [];

    async function sendMessage() {
      const textarea = document.getElementById('user-input');
      const text = textarea.value.trim();
      if (!text) return;

      textarea.value = '';
      textarea.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      addMessage('user', text);
      const typingEl = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory }),
        });

        typingEl.remove();

        if (!res.ok) {
          const err = await res.json();
          addMessage('bot', `芒職聽茂赂聫 ${err.error || '矛聵陇毛楼聵锚掳聙 毛掳聹矛聝聺铆聳聢矛聤碌毛聥聢毛聥陇.'}`);
        } else {
          const data = await res.json();
          addMessage('bot', data.reply);
          chatHistory.push({ role: 'user',      content: text });
          chatHistory.push({ role: 'assistant', content: data.reply });
          if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
        }
      } catch (e) {
        typingEl.remove();
        addMessage('bot', '芒職聽茂赂聫 矛聞聹毛虏聞矛聴聬 矛聴掳锚虏掳铆聲聽 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇. 矛聻聽矛聥聹 铆聸聞 毛聥陇矛聥聹 矛聥聹毛聫聞铆聲麓矛拢录矛聞赂矛職聰.');
      }

      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }

    function addMessage(role, text) {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'bot') {
        div.innerHTML = `<div class="bot-icon">冒聼聫篓</div><div class="bubble">${escapeHtml(text)}</div>`;
      } else {
        div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addTyping() {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.innerHTML = `<div class="bot-icon">冒聼聫篓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/\n/g, '<br>');
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
